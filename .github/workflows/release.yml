name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: "Package ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: wireviz-studio-windows
          - os: macos-latest
            artifact_name: wireviz-studio-macos
          - os: ubuntu-latest
            artifact_name: wireviz-studio-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Graphviz runtime
        uses: ts-graphviz/setup-graphviz@v2

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[gui]"
          python -m pip install pyinstaller==6.16.0

      - name: Build portable package
        run: python packaging/build_portable.py --build-type portable --clean --version "${{ github.ref_name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-artifacts/**
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
